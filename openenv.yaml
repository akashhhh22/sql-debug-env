name: SQLDebugEnv
description: >
  OpenEnv-compatible environment for debugging SQL queries against
  a deterministic, seeded SQLite database.
version: 1.0.0
entrypoint: server.app:app

runtime:
  type: docker
  dockerfile: Dockerfile

server:
  framework: fastapi
  host: 0.0.0.0
  port: 7860
  healthcheck: /health

environment:
  observation_model: models.Observation
  action_model:      models.Action
  state_model:       models.State
  reset_endpoint:
    method: POST
    path:   /reset
  step_endpoint:
    method: POST
    path:   /step
  state_endpoint:
    method: GET
    path:   /state

tasks:
  - name: easy
    description: "Fix a syntax error in a simple filtered SELECT query."
    grader:
      type: endpoint
      endpoint:
        method: POST
        path: /step
      field: info.score
      threshold: 1.0

  - name: medium
    description: "Fix a logical bug in a status filter for completed orders."
    grader:
      type: endpoint
      endpoint:
        method: POST
        path: /step
      field: info.score
      threshold: 1.0

  - name: hard
    description: "Fix a JOIN predicate bug in an aggregated reporting query."
    grader:
      type: endpoint
      endpoint:
        method: POST
        path: /step
      field: info.score
      threshold: 1.0
